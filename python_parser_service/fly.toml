# Fly.io config for Python parser service
# Run: fly launch --config fly.toml (from python_parser_service/ directory)

app = "rag-python-parser"      # change this to your app name on Fly.io
primary_region = "bom"          # Mumbai

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true     # can sleep — stateless, fast to start
  auto_start_machines = true

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
