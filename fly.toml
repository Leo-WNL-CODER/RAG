# Fly.io config for Rust Axum server
# Run: fly launch --config fly.toml (from RAG_Server/ root)

app = "rag-server-rust"       # change this to your app name on Fly.io
primary_region = "bom"         # Mumbai — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false    # keep alive so ONNX model stays in RAM
  auto_start_machines = true

[[vm]]
  memory = "1gb"                # minimum for ONNX model (~300MB) + overhead
  cpu_kind = "shared"
  cpus = 1
